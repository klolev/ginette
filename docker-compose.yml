version: '3.7'

services:
  browserless:
    image: browserless/chrome:latest
    environment:
      MAX_CONCURRENT_SESSIONS: 20
      MAX_QUEUE_LENGTH: 50
      CONNECTION_TIMEOUT: 30000

  app:
    image: ginette:latest
    platform: linux/amd64
    build:
      context: .
    environment:
      TOKEN: ${TOKEN}
      BROWSERLESS_URL: http://browserless:3000
    depends_on:
      - browserless
